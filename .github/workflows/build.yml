name: Build Unsigned IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build app
        run: |
          xcodebuild clean build \
            -scheme Entitlement \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Find .app
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Entitlement.app" -type d | head -n 1)
          echo "APP_PATH=$APP_PATH" >> $GITHUB_ENV

      - name: Package IPA
        run: |
          mkdir Payload
          cp -r "$APP_PATH" Payload/
          zip -r Entitlement.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Entitlement-unsigned
          path: Entitlement.ipa
